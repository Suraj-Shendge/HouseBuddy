name: housebuddy
description: HouseBuddy – Home‑service marketplace (Customer & Provider)
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.12.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.8.0
  firebase_analytics: ^10.6.0

  # State management
  flutter_riverpod: ^2.5.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI & Animations
  flutter_animate: ^4.2.0
  rive: ^0.12.0
  lottie: ^3.1.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Geolocation & Maps
  geolocator: ^12.0.0
  google_maps_flutter: ^2.5.0

  # Payment gateway
  razorpay_flutter: ^1.3.0

  # Misc
  intl: ^0.19.0
  uuid: ^4.3.0
  go_router: ^14.2.0
  flutter_form_builder: ^9.2.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  # -----------------------------------------------------------------
  # Asset directories – these **must** be listed here so Flutter can find them.
  # -----------------------------------------------------------------
  assets:
    - assets/rive/
    - assets/lottie/
    - assets/icons/

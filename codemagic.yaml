# ----------------------------------------------------------------------
# HouseBuddy – Codemagic CI/CD configuration
# ----------------------------------------------------------------------
# This file defines five workflows:
#   1️⃣ android-debug       – unit‑tests + unsigned debug APK
#   2️⃣ android-release    – signed AAB + upload to Google Play (internal track)
#   3️⃣ ios-debug          – unsigned .ipa for quick QA
#   4️⃣ ios-release        – signed .ipa + upload to TestFlight
#   5️⃣ functions-deploy    – deploy Firebase Cloud Functions (optional)
# ----------------------------------------------------------------------

workflows:
  # --------------------------------------------------------------------
  # 1️⃣ Android – Debug (customer flavor)
  # --------------------------------------------------------------------
  android-debug:
    name: Android Debug (Customer)
    max_build_duration: 30
    environment:
      flutter: stable
      java: '11'
      vars:
        API_BASE_URL: "https://staging.api.housebuddy.com"
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      # --------------------------------------------------------------
      # Debug helper – prints the repository tree (helps when “test not found”)
      # --------------------------------------------------------------
      - name: Debug – show repo layout
        script: |
          echo "=== pwd ==="
          pwd
          echo "=== root contents ==="
          ls -la
          echo "=== test folder (if any) ==="
          if [ -d test ]; then
            echo ">>> test/ exists – recursive listing"
            ls -R test
          else
            echo ">>> No test/ folder"
          fi

      # --------------------------------------------------------------
      # Guarded test step – runs only when a test folder exists
      # --------------------------------------------------------------
      - name: Run tests with coverage (skip if no test folder)
        script: |
          if [ -d test ]; then
            echo "🔎 test folder detected – running flutter test"
            flutter test --coverage
          else
            echo "⚠️ No test folder – creating dummy coverage file"
            mkdir -p coverage
            touch coverage/lcov.info
          fi

      # --------------------------------------------------------------
      # Build a debug APK (customer flavor)
      # --------------------------------------------------------------
      - name: Build debug APK (customer)
        script: |
          flutter build apk \
            --debug \
            --flavor customer \
            --target lib/main.dart

    artifacts:
      - build/app/outputs/apk/**/*.apk
      - coverage/**/*.info

  # --------------------------------------------------------------------
  # 2️⃣ Android – Release (provider flavor)
  # --------------------------------------------------------------------
  android-release:
    name: Android Release (Provider)
    max_build_duration: 55
    environment:
      flutter: stable
      java: '11'
      vars:
        # ----- Encrypt these values in Codemagic UI (Secure = ON) -----
        ANDROID_KEYSTORE_BASE64: Encrypted(${ANDROID_KEYSTORE_BASE64})
        ANDROID_KEYSTORE_PASSWORD: Encrypted(${ANDROID_KEYSTORE_PASSWORD})
        ANDROID_KEY_PASSWORD: Encrypted(${ANDROID_KEY_PASSWORD})
        GOOGLE_SERVICES_JSON: Encrypted(${GOOGLE_SERVICES_JSON})
        PLAY_STORE_JSON_KEY: Encrypted(${PLAY_STORE_JSON_KEY})
        FIREBASE_TOKEN: Encrypted(${FIREBASE_TOKEN})   # optional – needed if you call firebase CLI
        API_BASE_URL: "https://prod.api.housebuddy.com"
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Decode Android keystore
        script: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > $HOME/keystore.jks

      - name: Decode google‑services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json

      - name: Debug – show repo layout
        script: |
          pwd && ls -la && [ -d test ] && ls -R test || echo "No test folder"

      - name: Run tests with coverage (skip if no test folder)
        script: |
          if [ -d test ]; then
            flutter test --coverage
          else
            mkdir -p coverage && touch coverage/lcov.info
          fi

      - name: Build signed AAB (provider flavor)
        script: |
          flutter build appbundle \
            --release \
            --flavor provider \
            --target lib/main.dart \
            --build-number $CI_BUILD_NUMBER \
            --build-name $CI_BUILD_NUMBER

      - name: Deploy to Google Play (internal test track)
        script: |
          # Decode Play Store service account
          echo $PLAY_STORE_JSON_KEY | base64 --decode > $HOME/play_store.json

          # Prepare Fastlane Appfile (Fastlane is pre‑installed on Codemagic)
          mkdir -p fastlane
          cat > fastlane/Appfile <<EOF
          json_key_file("$HOME/play_store.json")
          package_name("com.example.housebuddy.provider")
          EOF

          # Upload AAB
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --track internal \
            --json_key $HOME/play_store.json \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots \
            --package_name com.example.housebuddy.provider

    artifacts:
      - build/app/outputs/**/*.aab
      - coverage/**/*.info

  # --------------------------------------------------------------------
  # 3️⃣ iOS – Debug (customer flavor)
  # --------------------------------------------------------------------
  ios-debug:
    name: iOS Debug (Customer)
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: "https://staging.api.housebuddy.com"
    scripts:
      - name: Install pods
        script: |
          cd ios && pod install && cd ..

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Debug – show repo layout
        script: |
          pwd && ls -la && [ -d test ] && ls -R test || echo "No test folder"

      - name: Run tests with coverage (skip if no test folder)
        script: |
          if [ -d test ]; then
            flutter test --coverage
          else
            mkdir -p coverage && touch coverage/lcov.info
          fi

      - name: Build unsigned IPA (customer flavor)
        script: |
          flutter build ios \
            --debug \
            --no-codesign \
            --flavor customer \
            --target lib/main.dart

    artifacts:
      - build/ios/ipa/*.ipa
      - coverage/**/*.info

  # --------------------------------------------------------------------
  # 4️⃣ iOS – Release (provider flavor)
  # --------------------------------------------------------------------
  ios-release:
    name: iOS Release (Provider)
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        # ----- Apple / Fastlane credentials (secure) -----
        APPLE_ID: Encrypted(${APPLE_ID})
        FASTLANE_PASSWORD: Encrypted(${FASTLANE_PASSWORD})
        APP_STORE_CONNECT_API_KEY_ID: Encrypted(${APP_STORE_CONNECT_API_KEY_ID})
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(${APP_STORE_CONNECT_ISSUER_ID})
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(${APP_STORE_CONNECT_PRIVATE_KEY})
        # ----- Firebase iOS config (secure) -----
        GOOGLE_SERVICES_PLIST: Encrypted(${GOOGLE_SERVICES_PLIST})
        API_BASE_URL: "https://prod.api.housebuddy.com"
    scripts:
      # --------------------------------------------------------------
      # 1️⃣ Write Firebase iOS config (GoogleService‑Info.plist)
      # --------------------------------------------------------------
      - name: Decode GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICES_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      # --------------------------------------------------------------
      # 2️⃣ Write Fastlane App Store Connect API key file
      # --------------------------------------------------------------
      - name: Write Fastlane API key file
        script: |
          mkdir -p ~/.fastlane
          cat <<EOF > ~/.fastlane/app_store_connect_api_key.json
          {
            "key_id": "$APP_STORE_CONNECT_API_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_ISSUER_ID",
            "key": "$APP_STORE_CONNECT_PRIVATE_KEY"
          }
          EOF

      - name: Install pods
        script: |
          cd ios && pod install && cd ..

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Debug – show repo layout
        script: |
          pwd && ls -la && [ -d test ] && ls -R test || echo "No test folder"

      - name: Run tests with coverage (skip if no test folder)
        script: |
          if [ -d test ]; then
            flutter test --coverage
          else
            mkdir -p coverage && touch coverage/lcov.info
          fi

      # --------------------------------------------------------------
      # 5️⃣ Build the archive (provider flavor)
      # --------------------------------------------------------------
      - name: Build iOS archive (provider flavor)
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --flavor provider \
            --target lib/main.dart

          # Export .xcarchive using the scheme that matches the flavor.
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme RunnerProvider \
            -configuration Release \
            -archivePath $HOME/RunnerProvider.xcarchive \
            archive

      # --------------------------------------------------------------
      # 6️⃣ Export signed .ipa
      # --------------------------------------------------------------
      - name: Export signed IPA
        script: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>YOUR_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.example.housebuddy.provider</key><string>HouseBuddy_Provisioning_Profile</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $HOME/RunnerProvider.xcarchive \
            -exportPath $HOME/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      # --------------------------------------------------------------
      # 7️⃣ Upload to TestFlight (Fastlane pilot)
      # --------------------------------------------------------------
      - name: Upload to TestFlight
        script: |
          fastlane pilot upload \
            --username "$APPLE_ID" \
            --app_identifier com.example.housebuddy.provider \
            --ipa $HOME/ipa/RunnerProvider.ipa \
            --skip_waiting_for_build_processing true \
            --skip_submission true

    artifacts:
      - $HOME/ipa/**/*.ipa
      - coverage/**/*.info

  # --------------------------------------------------------------------
  # 5️⃣ Functions – Deploy (optional)
  # --------------------------------------------------------------------
  functions-deploy:
    name: Deploy Firebase Functions
    max_build_duration: 20
    environment:
      node: '20'
      vars:
        # Service‑account JSON (base64) with Owner rights on the Firebase project
        FIREBASE_SERVICE_ACCOUNT: Encrypted(${FIREBASE_SERVICE_ACCOUNT})
    scripts:
      - name: Decode service account & set GOOGLE_APPLICATION_CREDENTIALS
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 --decode > $HOME/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json

      - name: Install Node dependencies
        script: |
          cd functions
          npm ci

      - name: Lint & build functions (optional)
        script: |
          cd functions
          npm run lint   # you can remove this line if you don’t have a lint script
          npm run build  # compiles TypeScript to lib/

      - name: Deploy functions
        script: |
          cd functions
          npm install -g firebase-tools
          firebase deploy --only functions --token "$(firebase login:ci)"

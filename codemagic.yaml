# --------------------------------------------------------------------
# Android Debug workflow (example – you’ll have the same change in iOS)
# --------------------------------------------------------------------
android-debug:
  name: Android Debug (Customer)
  max_build_duration: 30
  environment:
    flutter: stable
    java: '11'
    vars:
      API_BASE_URL: "https://staging.api.housebuddy.com"
  scripts:
    - name: Install dependencies
      script: flutter pub get

    # ------------ NEW: guarded test step ------------
    - name: Run tests with coverage (skip if no test folder)
      script: |
        if [ -d test ]; then
          echo "🔎 test folder found – running flutter test"
          flutter test --coverage
        else
          echo "⚠️ No test folder – creating empty coverage file"
          mkdir -p coverage
          touch coverage/lcov.info
        fi
    # -------------------------------------------------

    - name: Build debug APK (customer)
      script: |
        flutter build apk --debug --flavor customer --target lib/main.dart

  artifacts:
    - build/app/outputs/apk/**/*.apk
    - coverage/**/*.info

name: Clean Android (full Groovy + v2 embedding)

# --------------------------------------------------------------
# Manual trigger – run it when the Android project is broken.
# --------------------------------------------------------------
on:
  workflow_dispatch:   # the “Run workflow” button in the Actions UI

permissions:
  contents: write      # needed for the bot to push a commit

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout the repository (full history – required for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------------------
      # 2️⃣ **Install Flutter** – must be before any `flutter` command
      # --------------------------------------------------------------
      - name: Install Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable   # pulls the newest stable Flutter (contains Gradle wrapper)

      # --------------------------------------------------------------
      # 3️⃣ Delete any Kotlin‑DSL Gradle files (*.kts)
      # --------------------------------------------------------------
      - name: Remove .kts Gradle files
        run: |
          find android -type f -name "*.gradle.kts" -delete
          rm -f android/settings.gradle.kts

      # --------------------------------------------------------------
      # 4️⃣ Ensure the Gradle wrapper exists (flutter creates it automatically)
      # --------------------------------------------------------------
      - name: Ensure Gradle wrapper is present
        run: |
          # If the wrapper files already exist, this is a no‑op.
          # If they are missing (unlikely after `flutter create`), we let flutter generate them.
          if [ ! -f android/gradlew ]; then
            echo "Gradle wrapper missing – generating with flutter..."
            flutter doctor -v   # this forces the wrapper download
          else
            echo "Gradle wrapper already present."
          fi

      # --------------------------------------------------------------
      # 5️⃣ Write classic Groovy Gradle files (project‑level)
      # --------------------------------------------------------------
      - name: Write android/build.gradle (Groovy)
        run: |
          cat > android/build.gradle <<'EOF'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.2.2'
              classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
            }
          }

          allprojects {
            repositories {
              google()
              mavenCentral()
            }
          }
          EOF

      - name: Write android/settings.gradle (Groovy)
        run: |
          echo "include ':app'" > android/settings.gradle

      # --------------------------------------------------------------
      # 6️⃣ Write android/app/build.gradle (Groovy) – includes flavor block
      # --------------------------------------------------------------
      - name: Write android/app/build.gradle (Groovy)
        run: |
          cat > android/app/build.gradle <<'EOF'
          plugins {
            id 'com.android.application'
            id 'kotlin-android'
          }

          android {
            compileSdkVersion 34

            defaultConfig {
              applicationId "com.example.housebuddy"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode flutterVersionCode.toInteger()
              versionName flutterVersionName
            }

            flavorDimensions "app"

            productFlavors {
              customer {
                dimension "app"
                applicationIdSuffix ".customer"
                resValue "string", "app_name", "HouseBuddy"
              }
              provider {
                dimension "app"
                applicationIdSuffix ".provider"
                resValue "string", "app_name", "HouseBuddy Provider"
              }
            }

            signingConfigs { release { } }

            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
                shrinkResources false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
            kotlinOptions {
              jvmTarget = "11"
            }
          }

          flutter {
            source '../..'
          }

          dependencies {
            // No extra Android deps needed for a pure Flutter module.
          }
          EOF

      # --------------------------------------------------------------
      # 7️⃣ Delete any old MainApplication (v1) and ensure MainActivity (v2)
      # --------------------------------------------------------------
      - name: Delete old MainApplication files (v1)
        run: |
          find android/app/src/main -type f \( -name "MainApplication.kt" -o -name "MainApplication.java" \) -delete

      - name: Write proper MainActivity.kt (v2 embedding)
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/housebuddy
          cat > android/app/src/main/kotlin/com/example/housebuddy/MainActivity.kt <<'EOF'
          package com.example.housebuddy

          import io.flutter.embedding.android.FlutterFragmentActivity

          /**
           * Updated to use the new Android v2 embedding.
           * Extending FlutterFragmentActivity works for most plugins.
           */
          class MainActivity : FlutterFragmentActivity()
          EOF

      # --------------------------------------------------------------
      # 8️⃣ Commit & push the cleaned Android project back to the same branch
      # --------------------------------------------------------------
      - name: Commit and push cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add android/
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit – Android already clean."
            exit 0
          fi

          git commit -m "Clean Android: Groovy Gradle, v2 MainActivity, no v1 embedding."
          git push

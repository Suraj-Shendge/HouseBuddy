name: Clean Android v1 embedding & use Groovy Gradle

# This workflow can be triggered manually from the Actions tab.
on:
  workflow_dispatch:   # manual trigger

permissions:
  contents: write      # allow the bot to push changes

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # Checkout repository (full history needed for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------------------
      # 1️⃣ Delete any Kotlin‑DSL Gradle files (.*.kts)
      # --------------------------------------------------------------
      - name: Remove .kts Gradle files
        run: |
          find android -type f -name "*.gradle.kts" -delete
          rm -f android/settings.gradle.kts

      # --------------------------------------------------------------
      # 2️⃣ Add Groovy Gradle files (project level)
      # --------------------------------------------------------------
      - name: Write android/build.gradle (Groovy)
        run: |
          cat > android/build.gradle <<'EOF'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.2.2'
              classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
            }
          }
          allprojects {
            repositories {
              google()
              mavenCentral()
            }
          }
          EOF

      - name: Write android/settings.gradle (Groovy)
        run: |
          echo "include ':app'" > android/settings.gradle

      # --------------------------------------------------------------
      # 3️⃣ Write android/app/build.gradle (Groovy) with flavor block
      # --------------------------------------------------------------
      - name: Write android/app/build.gradle (Groovy)
        run: |
          cat > android/app/build.gradle <<'EOF'
          plugins {
            id 'com.android.application'
            id 'kotlin-android'
          }

          android {
            compileSdkVersion 34

            defaultConfig {
              applicationId "com.example.housebuddy"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode flutterVersionCode.toInteger()
              versionName flutterVersionName
            }

            flavorDimensions "app"

            productFlavors {
              customer {
                dimension "app"
                applicationIdSuffix ".customer"
                resValue "string", "app_name", "HouseBuddy"
              }
              provider {
                dimension "app"
                applicationIdSuffix ".provider"
                resValue "string", "app_name", "HouseBuddy Provider"
              }
            }

            signingConfigs { release { } }

            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
                shrinkResources false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
            kotlinOptions {
              jvmTarget = "11"
            }
          }

          flutter {
            source '../..'
          }

          dependencies {
            // No extra Android dependencies needed.
          }
          EOF

      # --------------------------------------------------------------
      # 4️⃣ Delete any old MainApplication (v1) and ensure MainActivity (v2)
      # --------------------------------------------------------------
      - name: Delete old MainApplication files (v1)
        run: |
          find android/app/src/main -type f \( -name "MainApplication.kt" -o -name "MainApplication.java" \) -delete

      - name: Write correct MainActivity.kt (v2 embedding)
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/housebuddy
          cat > android/app/src/main/kotlin/com/example/housebuddy/MainActivity.kt <<'EOF'
          package com.example.housebuddy

          import io.flutter.embedding.android.FlutterFragmentActivity

          class MainActivity : FlutterFragmentActivity()
          EOF

      # --------------------------------------------------------------
      # 5️⃣ Commit & push the cleaned Android project
      # --------------------------------------------------------------
      - name: Commit and push cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add android/
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit."
            exit 0
          fi

          git commit -m "Clean Android: remove v1 embedding, switch to Groovy Gradle, add v2 MainActivity."
          git push

name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# This workflow is started manually (workflow_dispatch) and will:
#   1️⃣ Checkout the repo (full history – needed for push)
#   2️⃣ Install Flutter (stable 3.19)
#   3️⃣ Run `flutter create .` – generates missing android/ & ios/
#      (using a lower‑case project name to avoid the name‑validation error)
#   4️⃣ Overwrite android/app/build.gradle with your flavor block
#   5️⃣ Commit only if there are changes and push back to the repo
# --------------------------------------------------------------
on:
  workflow_dispatch:   # enables the “Run workflow” button

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout repository (full history – required for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch full history so we can push later

      # --------------------------------------------------------------
      # 2️⃣ Install Flutter (stable channel, version 3.19.0)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.0'

      # --------------------------------------------------------------
      # 3️⃣ Generate missing platform directories (force a valid name)
      # --------------------------------------------------------------
      - name: Run flutter create .
        # `HouseBuddy` (capital letters) is illegal → force lower‑case name
        run: flutter create . --project-name housebuddy

      # --------------------------------------------------------------
      # 4️⃣ Overwrite android/app/build.gradle with the flavor block
      # --------------------------------------------------------------
      - name: Overwrite android/app/build.gradle with flavor block
        run: |
          printf "%s\n" "android {" \
          "  compileSdkVersion 34" \
          "" \
          "  defaultConfig {" \
          "    applicationId \"com.example.housebuddy\"" \
          "    minSdkVersion 21" \
          "    targetSdkVersion 34" \
          "    versionCode flutterVersionCode.toInteger()" \
          "    versionName flutterVersionName" \
          "  }" \
          "" \
          "  flavorDimensions \"app\"" \
          "" \
          "  productFlavors {" \
          "    customer {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".customer\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy\"" \
          "    }" \
          "    provider {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".provider\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy Provider\"" \
          "    }" \
          "  }" \
          "" \
          "  signingConfigs { release { } }" \
          "  buildTypes { release { signingConfig signingConfigs.release } }" \
          "}" > android/app/build.gradle

      # --------------------------------------------------------------
      # 5️⃣ Commit and push ONLY IF there are changes
      # --------------------------------------------------------------
      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Stage the newly‑generated directories/files
          git add android ios

          # If nothing staged → exit successfully
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit – everything already up‑to‑date."
          else
            echo "🔧 Changes detected – committing & pushing..."
            git commit -m "Add proper Android & iOS dirs (flutter create .) – auto‑fixed"
            git push
          fi

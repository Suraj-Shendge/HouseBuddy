name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# This workflow is started manually (workflow_dispatch) and will:
#   1️⃣ Checkout the repo (full history – needed for push)
#   2️⃣ Install the **latest stable** Flutter (which includes Dart 3.4+)
#   3️⃣ Run `flutter create . --project-name housebuddy`
#      → generates the missing android/ and ios/ directories.
#   4️⃣ Overwrite android/app/build.gradle with the flavor block you need.
#   5️⃣ Commit ONLY IF there are changes and push back to the repo.
# --------------------------------------------------------------
on:
  workflow_dispatch:   # enables the “Run workflow” button

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout repository (full history – required for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so `git push` works later

      # --------------------------------------------------------------
      # 2️⃣ Install **latest stable** Flutter (no explicit version pin)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable   # pulls the newest stable Flutter (currently 3.22.x)

      # --------------------------------------------------------------
      # 3️⃣ Generate missing platform directories (force a lower‑case name)
      # --------------------------------------------------------------
      - name: Run flutter create .
        # The repo folder name “HouseBuddy” is illegal for a Dart package,
        # so we force a valid lower‑case project name.
        run: flutter create . --project-name housebuddy

      # --------------------------------------------------------------
      # 4️⃣ Overwrite android/app/build.gradle with your flavor block
      # --------------------------------------------------------------
      - name: Overwrite android/app/build.gradle with flavor block
        run: |
          printf "%s\n" "android {" \
          "  compileSdkVersion 34" \
          "" \
          "  defaultConfig {" \
          "    applicationId \"com.example.housebuddy\"" \
          "    minSdkVersion 21" \
          "    targetSdkVersion 34" \
          "    versionCode flutterVersionCode.toInteger()" \
          "    versionName flutterVersionName" \
          "  }" \
          "" \
          "  flavorDimensions \"app\"" \
          "" \
          "  productFlavors {" \
          "    customer {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".customer\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy\"" \
          "    }" \
          "    provider {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".provider\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy Provider\"" \
          "    }" \
          "  }" \
          "" \
          "  signingConfigs { release { } }" \
          "  buildTypes { release { signingConfig signingConfigs.release } }" \
          "}" > android/app/build.gradle

      # --------------------------------------------------------------
      # 5️⃣ Commit and push ONLY IF there are changes
      # --------------------------------------------------------------
      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure the bot identity for the commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Stage everything that could have been created/modified
          git add android ios

          # If nothing is staged, exit cleanly
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit – repository already contains the Android/iOS folders."
          else
            echo "🔧 Changes

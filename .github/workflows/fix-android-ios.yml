name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# Run manually from the GitHub UI.
# It creates a full Android & iOS scaffold using Groovy Gradle
# (the format Codemagic understands) and pushes the result to a
# temporary branch, so protected‑branch rules are not a problem.
# --------------------------------------------------------------
on:
  workflow_dispatch:   # enables the “Run workflow” button

# Permissions needed for the bot to push a new branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout the repo (full history – required for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for subsequent git push

      # --------------------------------------------------------------
      # 2️⃣ Install the **latest stable** Flutter (includes Dart 3.4+)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable   # pulls the newest stable Flutter (Groovy Android)

      # --------------------------------------------------------------
      # 3️⃣ Generate Android & iOS scaffolding (Java → Groovy Gradle)
      # --------------------------------------------------------------
      - name: Run flutter create .
        # * `--android-language java` ensures Groovy Gradle files.
        # * `--project-name housebuddy` gives a valid lower‑case name.
        run: flutter create . --project-name housebuddy --android-language java

      # --------------------------------------------------------------
      # 4️⃣ **(Optional) Clean up any stray .kts files** that might
      #     have been generated by older Flutter versions.
      # --------------------------------------------------------------
      - name: Remove possible Kotlin‑DSL files
        run: |
          find . -type f \( -name "*.gradle.kts" -o -name "settings.gradle.kts" \) -delete

      # --------------------------------------------------------------
      # 5️⃣ Commit the new Android/iOS folders and push to a **new** branch
      # --------------------------------------------------------------
      - name: Commit and push changes to a new branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure bot identity for the commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Stage the newly‑created platform directories
          git add android ios

          # If nothing changed, exit cleanly (no push needed)
          if git diff --cached --quiet; then
            echo "🟢 No changes to commit – Android/iOS already present."
            exit 0
          fi

          # Create a unique temporary branch name
          BRANCH="auto-fix-android-ios-${{ github.run_id }}"
          echo "Creating branch $BRANCH"
          git checkout -b "$BRANCH"

          # Commit the changes
          git commit -m "Add proper Android & iOS directories (flutter create .) – auto‑fixed"

          # Push the new branch back to the repository
          git push origin "$BRANCH"

          echo "✅ Changes pushed to $BRANCH – open a Pull Request to merge."

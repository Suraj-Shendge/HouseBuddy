name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# Triggered manually from the GitHub UI
# --------------------------------------------------------------
on:
  workflow_dispatch:   # enables the “Run workflow” button

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout the repository (full history – needed for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can push later

      # --------------------------------------------------------------
      # 2️⃣ Install the **latest stable** Flutter (includes Dart 3.4+)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable   # pulls the newest stable Flutter (3.xx)

      # --------------------------------------------------------------
      # 3️⃣ Generate missing platform directories (force a lower‑case name)
      # --------------------------------------------------------------
      - name: Run flutter create .
        run: flutter create . --project-name housebuddy

      # --------------------------------------------------------------
      # 4️⃣ Overwrite android/app/build.gradle with your flavor block
      # --------------------------------------------------------------
      - name: Overwrite android/app/build.gradle with flavor block
        run: |
          printf "%s\n" "android {" \
          "  compileSdkVersion 34" \
          "" \
          "  defaultConfig {" \
          "    applicationId \"com.example.housebuddy\"" \
          "    minSdkVersion 21" \
          "    targetSdkVersion 34" \
          "    versionCode flutterVersionCode.toInteger()" \
          "    versionName flutterVersionName" \
          "  }" \
          "" \
          "  flavorDimensions \"app\"" \
          "" \
          "  productFlavors {" \
          "    customer {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".customer\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy\"" \
          "    }" \
          "    provider {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".provider\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy Provider\"" \
          "    }" \
          "  }" \
          "" \
          "  signingConfigs { release { } }" \
          "  buildTypes { release { signingConfig signingConfigs.release } }" \
          "}" > android/app/build.gradle

      # --------------------------------------------------------------
      # 5️⃣ Commit and push ONLY IF there are changes
      # --------------------------------------------------------------
      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure a bot identity for the commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Stage everything that could have been created/modified
          git add android ios

          # If nothing is staged, exit cleanly
          if git diff --cached --quiet; then
            echo 'No changes to commit – repository already contains the Android/iOS folders.'
          else
            echo 'Changes detected – committing and pushing...'
            git commit -m 'Add Android & iOS directories (flutter create .) - auto‑fixed'
            git push
          fi

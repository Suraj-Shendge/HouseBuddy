name: Fix missing Android/iOS folders (Groovy)

on:
  workflow_dispatch:   # manual trigger

permissions:
  contents: write      # allow the bot to push a new branch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout the repo (full history)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------------------
      # 2️⃣ Install latest stable Flutter (Groovy Android by default)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # --------------------------------------------------------------
      # 3️⃣ **Delete any existing Android folder** (prevents reuse of .kts)
      # --------------------------------------------------------------
      - name: Remove old Android folder (if any)
        run: rm -rf android

      # --------------------------------------------------------------
      # 4️⃣ Create a fresh Android/iOS scaffold (Java → Groovy)
      # --------------------------------------------------------------
      - name: Run flutter create .
        run: flutter create . --project-name housebuddy --android-language java

      # --------------------------------------------------------------
      # 5️⃣ (Optional) Clean stray Kotlin‑DSL files – they shouldn't exist now
      # --------------------------------------------------------------
      - name: Remove any .gradle.kts files that might still be there
        run: |
          find . -type f \( -name "*.gradle.kts" -o -name "settings.gradle.kts" \) -delete

      # --------------------------------------------------------------
      # 6️⃣ Commit & push the new Android/iOS directories to a temp branch
      # --------------------------------------------------------------
      - name: Commit and push changes to a new branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add android ios

          if git diff --cached --quiet; then
            echo "🟢 No changes – Android/iOS already present."
            exit 0
          fi

          BRANCH="auto-fix-android-ios-${{ github.run_id }}"
          echo "Creating branch $BRANCH"
          git checkout -b "$BRANCH"

          git commit -m "Add proper Android & iOS directories (flutter create .) – Groovy"
          git push origin "$BRANCH"

          echo "✅ Changes pushed to $BRANCH – open a Pull Request to merge."

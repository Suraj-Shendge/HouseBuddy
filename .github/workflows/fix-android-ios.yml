name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# This workflow is started manually from the GitHub UI (Actions →
# Run workflow). It creates the missing android/ and ios/ folders
# by running `flutter create .` and then injects the flavor block
# you already defined.
# --------------------------------------------------------------
on:
  workflow_dispatch:   # Enables the “Run workflow” button

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # --------------------------------------------------------------
      # 1️⃣ Checkout the repository (full history – needed for push)
      # --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # get the full history so we can push later

      # --------------------------------------------------------------
      # 2️⃣ Install Flutter (stable channel, version 3.19.0)
      # --------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.0'

      # --------------------------------------------------------------
      # 3️⃣ Generate missing platform directories
      # --------------------------------------------------------------
      - name: Run flutter create .
        run: flutter create .

      # --------------------------------------------------------------
      # 4️⃣ Overwrite android/app/build.gradle with the flavor block
      # --------------------------------------------------------------
      - name: Overwrite android/app/build.gradle with flavor block
        run: |
          printf "%s\n" "android {" \
          "  compileSdkVersion 34" \
          "" \
          "  defaultConfig {" \
          "    applicationId \"com.example.housebuddy\"" \
          "    minSdkVersion 21" \
          "    targetSdkVersion 34" \
          "    versionCode flutterVersionCode.toInteger()" \
          "    versionName flutterVersionName" \
          "  }" \
          "" \
          "  flavorDimensions \"app\"" \
          "" \
          "  productFlavors {" \
          "    customer {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".customer\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy\"" \
          "    }" \
          "    provider {" \
          "      dimension \"app\"" \
          "      applicationIdSuffix \".provider\"" \
          "      resValue \"string\", \"app_name\", \"HouseBuddy Provider\"" \
          "    }" \
          "  }" \
          "" \
          "  signingConfigs { release { } }" \
          "  buildTypes { release { signingConfig signingConfigs.release } }" \
          "}" > android/app/build.gradle

      # --------------------------------------------------------------
      # 5️⃣ Commit the new android/ and ios/ folders and push back
      # --------------------------------------------------------------
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add android ios
          git commit -m "Add proper Android & iOS directories (flutter create .) – auto‑fixed"
          git push

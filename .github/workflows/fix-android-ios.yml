name: Fix missing Android/iOS folders

# --------------------------------------------------------------
# Run manually from the Actions tab → “Run workflow”
# --------------------------------------------------------------
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # get full history so we can push back

      - name: Install Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.0'

      - name: Run flutter create .
        run: flutter create .

      # --------------------------------------------------------------
      # OPTIONAL – replace the generated build.gradle with your flavor block
      # --------------------------------------------------------------
      - name: Overwrite android/app/build.gradle with flavor block
        run: |
          cat > android/app/build.gradle <<'EOF'
   // ---- paste the whole block from the answer (including `android { … }`) ----
   android {
     compileSdkVersion 34
     defaultConfig {
       applicationId "com.example.housebuddy"
       minSdkVersion 21
       targetSdkVersion 34
       versionCode flutterVersionCode.toInteger()
       versionName flutterVersionName
     }
     flavorDimensions "app"
     productFlavors {
       customer {
         dimension "app"
         applicationIdSuffix ".customer"
         resValue "string", "app_name", "HouseBuddy"
       }
       provider {
         dimension "app"
         applicationIdSuffix ".provider"
         resValue "string", "app_name", "HouseBuddy Provider"
       }
     }
     signingConfigs { release { } }
     buildTypes { release { signingConfig signingConfigs.release } }
   }
   EOF

      - name: Commit and push generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add android ios
          git commit -m "Add proper Android & iOS folders (flutter create .) – auto‑fixed via GH Action"
          git push

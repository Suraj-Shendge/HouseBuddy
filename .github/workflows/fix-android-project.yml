name: Fix Android Project (Complete Regeneration)

on:
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write      # Allow pushing changes

jobs:
  fix-android:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3️⃣ Remove existing Android folder completely
      - name: Remove old Android folder
        run: rm -rf android

      # 4️⃣ Generate fresh Android project with Groovy files
      - name: Generate fresh Android project
        run: |
          flutter create . \
            --project-name housebuddy \
            --android-language java \
            --org com.example \
            --platforms=android

      # 5️⃣ Add your flavor configuration to the generated build.gradle
      - name: Add flavor configuration
        run: |
          cat > android/app/build.gradle <<'EOF'
          plugins {
            id 'com.android.application'
            id 'kotlin-android'
          }

          android {
            compileSdkVersion 34

            defaultConfig {
              applicationId "com.example.housebuddy"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode flutterVersionCode.toInteger()
              versionName flutterVersionName
            }

            flavorDimensions "app"

            productFlavors {
              customer {
                dimension "app"
                applicationIdSuffix ".customer"
                resValue "string", "app_name", "HouseBuddy"
              }
              provider {
                dimension "app"
                applicationIdSuffix ".provider"
                resValue "string", "app_name", "HouseBuddy Provider"
              }
            }

            signingConfigs { release { } }

            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
                shrinkResources false
              }
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
            kotlinOptions {
              jvmTarget = "11"
            }
          }

          flutter {
            source '../..'
          }

          dependencies {
            // No extra Android dependencies needed.
          }
          EOF

      # 6️⃣ Ensure MainActivity uses v2 embedding
      - name: Ensure v2 MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/housebuddy
          cat > android/app/src/main/kotlin/com/example/housebuddy/MainActivity.kt <<'EOF'
          package com.example.housebuddy

          import io.flutter.embedding.android.FlutterFragmentActivity

          class MainActivity: FlutterFragmentActivity()
          EOF

      # 7️⃣ Commit and push changes
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git add android/
          git commit -m "Fix Android project: Regenerate with Groovy Gradle files and v2 embedding"
          git push

workflows:
  # --------------------------------------------------------------------
  #  Android Debug – quick sanity check (no signing)
  # --------------------------------------------------------------------
  android-debug:
    name: Android Debug (Customer)
    max_build_duration: 30
    environment:
      flutter: stable
      java: '11'
      vars:
        # (optional) any extra env vars you need locally, e.g. API URLs
        API_BASE_URL: "https://staging.api.housebuddy.com"
    scripts:
      # ---------- Flutter ----------
      - name: Install dependencies
        script: |
          flutter pub get

      # ---------- Unit / Widget tests ----------
      - name: Run tests with coverage
        script: |
          flutter test --coverage
          # Upload coverage to Codemagic (built‑in UI)
          # If you want to upload to Codecov, add:
          # curl -s https://codecov.io/bash | bash -s -- -f coverage/lcov.info

      # ---------- Build APK (customer flavor) ----------
      - name: Build debug APK (customer)
        script: |
          flutter build apk --debug --flavor customer --target lib/main.dart

    artifacts:
      - build/app/outputs/apk/**/*.apk
      - coverage/**/*.info

  # --------------------------------------------------------------------
  #  Android Release – signed AAB → Google Play
  # --------------------------------------------------------------------
  android-release:
    name: Android Release (Provider)
    max_build_duration: 45
    environment:
      flutter: stable
      java: '11'
      # ―――――――――――――――――――――――――――――――――――――――――――――――――
      # Encrypted variables – set them in Codemagic UI (Settings ➜ Environment ➜ Encrypted)
      # --------------------------------------------------------------------
      vars:
        # 1️⃣ Keystore (base64) – generated once locally:
        #    `base64 -i my-release-key.jks`
        ANDROID_KEYSTORE_BASE64: Encrypted(${ANDROID_KEYSTORE_BASE64})
        ANDROID_KEYSTORE_PASSWORD: Encrypted(${ANDROID_KEYSTORE_PASSWORD})
        ANDROID_KEY_PASSWORD: Encrypted(${ANDROID_KEY_PASSWORD})
        # 2️⃣ Google services JSON (base64) – from Firebase console:
        GOOGLE_SERVICES_JSON: Encrypted(${GOOGLE_SERVICES_JSON})
        # 3️⃣ Firebase CI token – needed if you want to run any firebase CLI command:
        FIREBASE_TOKEN: Encrypted(${FIREBASE_TOKEN})
        # 4️⃣ Google Play service account JSON (base64) for Fastlane supply:
        PLAY_STORE_JSON_KEY: Encrypted(${PLAY_STORE_JSON_KEY})
        # (optional) custom API base URL for staging
        API_BASE_URL: "https://staging.api.housebuddy.com"

    scripts:
      # ---------- Prepare signing ----------
      - name: Decode keystore
        script: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > $HOME/keystore.jks

      # ---------- Google services ----------
      - name: Decode google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json

      # ---------- Flutter deps ----------
      - name: Install Flutter packages
        script: |
          flutter pub get

      # ---------- Tests ----------
      - name: Run unit / widget tests
        script: |
          flutter test --coverage

      # ---------- Build release AAB (provider flavor) ----------
      - name: Build AAB (provider)
        script: |
          flutter build appbundle \
            --release \
            --flavor provider \
            --target lib/main.dart \
            --build-number $CI_BUILD_NUMBER \
            --build-name $CI_BUILD_NUMBER

      # ---------- Fastlane upload to Google Play ----------
      - name: Publish to Google Play
        script: |
          # Fastlane is pre‑installed on Codemagic images
          # Decode the Play Store service account JSON
          echo $PLAY_STORE_JSON_KEY | base64 --decode > /tmp/play_store.json

          # Create a temporary fastlane config (fastlane/Appfile)
          mkdir -p fastlane
          cat > fastlane/Appfile <<EOF
          json_key_file("/tmp/play_store.json")
          package_name("com.example.housebuddy.provider")
          EOF

          # Supply (fastlane) will upload the AAB
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots \
            --track internal \
            --json_key /tmp/play_store.json \
            --package_name com.example.housebuddy.provider

    artifacts:
      - build/app/outputs/**/*.aab
      - coverage/**/*.info

  # --------------------------------------------------------------------
  #  iOS Debug – quick UI sanity check (unsignified ipa)
  # --------------------------------------------------------------------
  ios-debug:
    name: iOS Debug (Customer)
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      vars:
        # If you need any secret env for the API (e.g. staging endpoint)
        API_BASE_URL: "https://staging.api.housebuddy.com"

    scripts:
      - name: Install pods
        script: |
          cd ios && pod install && cd ..

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Run tests with coverage
        script: |
          flutter test --coverage

      - name: Build unsigned IPA (customer flavor)
        script: |
          flutter build ios \
            --debug \
            --no-codesign \
            --flavor customer \
            --target lib/main.dart

    artifacts:
      - build/ios/ipa/*.ipa
      - coverage/**/*.info

  # --------------------------------------------------------------------
  #  iOS Release – signed IPA → TestFlight (both flavors)
  # --------------------------------------------------------------------
  ios-release:
    name: iOS Release (Provider)
    max_build_duration: 45
    environment:
      xcode: latest
      cocoapods: default
      # ―――――――――――――――――――――――――――――――――――――――――――――――――
      # Encrypted secrets (set in Codemagic UI)
      # --------------------------------------------------------------------
      vars:
        # 1️⃣ Apple ID password (for fastlane pilot)
        FASTLANE_PASSWORD: Encrypted(${FASTLANE_PASSWORD})
        # 2️⃣ Apple ID (email) – plain text is fine, but you can encrypt too
        APPLE_ID: Encrypted(${APPLE_ID})
        # 3️⃣ App Store Connect API key (private key – base64)
        APP_STORE_CONNECT_API_KEY_ID: Encrypted(${APP_STORE_CONNECT_API_KEY_ID})
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(${APP_STORE_CONNECT_ISSUER_ID})
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(${APP_STORE_CONNECT_PRIVATE_KEY})
        # 4️⃣ Firebase token (optional for CI commands)
        FIREBASE_TOKEN: Encrypted(${FIREBASE_TOKEN})
        # 5️⃣ Google services plist (base64) – for iOS Firebase
        GOOGLE_SERVICES_PLIST: Encrypted(${GOOGLE_SERVICES_PLIST})
        # (optional) custom API base URL for staging
        API_BASE_URL: "https://staging.api.housebuddy.com"

    scripts:
      # ---------- Write GoogleService-Info.plist ----------
      - name: Decode GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICES_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      # ---------- Write Fastlane App Store Connect API key ----------
      - name: Create Fastlane API Key JSON
        script: |
          mkdir -p ~/.fastlane
          cat <<EOF > ~/.fastlane/app_store_connect_api_key.json
          {
            "key_id": "$APP_STORE_CONNECT_API_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_ISSUER_ID",
            "key": "$APP_STORE_CONNECT_PRIVATE_KEY"
          }
          EOF

      # ---------- Install pods ----------
      - name: Pod install
        script: |
          cd ios && pod install && cd ..

      # ---------- Flutter deps ----------
      - name: Flutter pub get
        script: |
          flutter pub get

      # ---------- Run tests ----------
      - name: Run tests with coverage
        script: |
          flutter test --coverage

      # ---------- Build archive (Provider flavor) ----------
      - name: Build iOS archive (provider)
        script: |
          # Build an archive without signing (Codemagic supplies signing later)
          flutter build ios \
            --release \
            --no-codesign \
            --flavor provider \
            --target lib/main.dart

          # Create Xcode archive (only needed for Fastlane)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme RunnerProvider \
            -configuration Release \
            -archivePath $HOME/RunnerProvider.xcarchive \
            archive

      # ---------- Export signed .ipa ----------
      - name: Export signed IPA
        script: |
          # ExportOptions.plist – you can store a template in repo (fastlane recommends)
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>teamID</key><string>YOUR_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.example.housebuddy.provider</key><string>HouseBuddy_Provisioning_Profile</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $HOME/RunnerProvider.xcarchive \
            -exportPath $HOME/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      # ---------- Upload to TestFlight ----------
      - name: Upload to TestFlight (pilot)
        script: |
          fastlane pilot upload \
            --username "$APPLE_ID" \
            --app_identifier com.example.housebuddy.provider \
            --ipa $HOME/ipa/RunnerProvider.ipa \
            --skip_waiting_for_build_processing true \
            --skip_submission true

    artifacts:
      - $HOME/ipa/**/*.ipa
      - coverage/**/*.info

  # --------------------------------------------------------------------
  #  (Optional) Deploy Firebase Functions from Codemagic
  # --------------------------------------------------------------------
  functions-deploy:
    name: Deploy Firebase Functions
    max_build_duration: 20
    environment:
      node: '20'
      vars:
        # Service account JSON for CI (base64)
        FIREBASE_SERVICE_ACCOUNT: Encrypted(${FIREBASE_SERVICE_ACCOUNT})
    scripts:
      - name: Decode service account
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 --decode > $HOME/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json

      - name: Install dependencies
        script: |
          cd functions
          npm ci

      - name: Lint & type‑check
        script: |
          cd functions
          npm run lint   # add a lint script if you want
          npm run build  # compiles TypeScript to lib/

      - name: Deploy functions
        script: |
          cd functions
          npm install -g firebase-tools
          firebase deploy --only functions --token "$(firebase login:ci)" # alternatively use $FIREBASE_TOKEN
